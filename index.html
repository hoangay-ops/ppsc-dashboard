<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PPSC Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--muted:#64748b;
  --text:#0f172a;--accent:#2563eb;--success:#059669;--warn:#d97706;--danger:#dc2626;
  --radius:10px;--sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg);display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
h2{font-size:16px;font-weight:600;margin-bottom:.6rem}
h3{font-size:14px;font-weight:600}

/* ── Sidebar ── */
aside{background:var(--surface);border-right:1px solid var(--border);padding:1rem;display:flex;flex-direction:column;gap:1rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-size:15px;font-weight:700;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.sec-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem}
.award-btn{width:100%;text-align:left;padding:.4rem .6rem;border-radius:6px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:6px}
.award-btn:hover{background:#f1f5f9}
.award-btn.active{background:#eff6ff;color:var(--accent);font-weight:600}
.award-btn .del{opacity:0;font-size:11px;color:var(--muted)}
.award-btn:hover .del{opacity:1}
.month-btn{width:100%;text-align:left;padding:.3rem .6rem .3rem 1.4rem;border-radius:6px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted)}
.month-btn:hover{background:#f1f5f9;color:var(--text)}
.month-btn.active{color:var(--accent);font-weight:600}
.upload-box{border:1px dashed var(--border);border-radius:var(--radius);padding:1rem;text-align:center;cursor:pointer;font-size:12px;color:var(--muted)}
.upload-box:hover{background:#f8fafc}
.upload-box input{display:none}

/* ── Main ── */
main{padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;overflow-x:hidden}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:700}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:3px}

/* ── Upload panel ── */
#uploadPanel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:2.5rem;text-align:center;cursor:pointer;transition:background .15s}
.drop-zone.over{background:#eff6ff;border-color:var(--accent)}
.drop-zone input{display:none}
.file-list{margin-top:1rem;display:flex;flex-direction:column;gap:6px}
.file-chip{display:flex;align-items:center;justify-content:space-between;padding:.4rem .7rem;border-radius:6px;background:#f1f5f9;font-size:12px}
.file-chip .kind{padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
.kind-main{background:#dbeafe;color:#1d4ed8}
.kind-hours{background:#dcfce7;color:#15803d}
.kind-narrative{background:#fef9c3;color:#854d0e}
.kind-stories{background:#f3e8ff;color:#7e22ce}
.kind-unknown{background:#f1f5f9;color:#64748b}
.upload-controls{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;margin-top:1rem}
.upload-controls label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px}
.upload-controls input,.upload-controls select{padding:.4rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text)}
button.primary{padding:.45rem 1rem;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
button.primary:hover{background:#1d4ed8}
button.primary:disabled{opacity:.5;cursor:not-allowed}
.upload-msg{font-size:13px;margin-top:.75rem;padding:.5rem .75rem;border-radius:6px}
.upload-msg.ok{background:#dcfce7;color:#15803d}
.upload-msg.err{background:#fee2e2;color:#b91c1c}

/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.kpi .val{font-size:22px;font-weight:700;margin-top:4px}
.kpi .hint{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}

/* ── Alerts ── */
.alert{padding:.6rem 1rem;border-radius:8px;font-size:13px;margin-bottom:4px}
.alert-danger{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.alert-warn{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}
.alert-ok{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}

/* ── Progress ── */
.prog{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
td{padding:9px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr:hover{background:#f8fafc;cursor:pointer}
.pill{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.p-green{background:#dcfce7;color:#15803d}
.p-amber{background:#fef9c3;color:#854d0e}
.p-red{background:#fee2e2;color:#b91c1c}
.p-blue{background:#dbeafe;color:#1d4ed8}

/* ── Expand row ── */
.expand-row td{padding:0}
.expand-inner{padding:.75rem 1.25rem;background:#f8fafc}
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:.5rem}
.ws-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.65rem .8rem;font-size:12px}
.ws-card .wn{font-weight:600;margin-bottom:4px}
.ws-card .wm{color:var(--muted)}

/* ── Filters ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:.75rem}
.filter-row select,.filter-row input{padding:.35rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text)}
.tab-btns{display:flex;gap:4px}
.tab-btn{padding:.3rem .65rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;color:var(--muted)}
.tab-btn:hover{background:#f1f5f9}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Chart ── */
.chart-wrap{position:relative;width:100%;height:240px}

/* ── People bars ── */
.pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.pbar-label{width:52px;flex:none;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbar-track{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px}
.pbar-val{width:42px;text-align:right;color:var(--muted)}

/* ── Empty / loading ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:4rem 2rem;text-align:center;color:var(--muted)}

@media(max-width:700px){body{grid-template-columns:1fr}aside{display:none}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside>
  <div class="logo">PPSC Dashboard</div>

  <div>
    <div class="sec-label">Awards</div>
    <div id="awardList"></div>
  </div>

  <div style="margin-top:auto">
    <div class="sec-label" style="margin-bottom:.5rem">Upload files</div>
    <label class="upload-box">
      <div style="font-size:22px;margin-bottom:4px">+</div>
      <div>Drop files or click</div>
      <div style="font-size:11px;margin-top:2px">.xlsx · .docx</div>
      <input type="file" id="sideUpload" accept=".xlsx,.docx" multiple/>
    </label>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <!-- Upload panel (always visible at top) -->
  <div id="uploadPanel" class="card">
    <h2>Upload monthly files</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">
      Drop all files for one month at once — the main workbook, hours/LCAT file, narrative .docx, and stories file are all auto-detected by filename.
    </p>
    <label class="drop-zone" id="dropZone">
      <div style="font-size:32px;margin-bottom:.5rem">📂</div>
      <div style="font-weight:600;color:var(--text)">Drop files here</div>
      <div style="font-size:12px;margin-top:4px">or click to browse — select all files for the month together</div>
      <input type="file" id="mainUpload" accept=".xlsx,.docx" multiple/>
    </label>
    <div class="file-list" id="fileList"></div>
    <div class="upload-controls">
      <div>
        <label>Award number override</label>
        <input type="text" id="awardOverride" placeholder="e.g. OT2OD036464" style="width:200px"/>
      </div>
      <div>
        <label>Month override</label>
        <select id="monthOverride">
          <option value="">Auto-detect</option>
          <option>Jan</option><option>Feb</option><option>Mar</option><option>Apr</option>
          <option>May</option><option>Jun</option><option>Jul</option><option>Aug</option>
          <option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option>
        </select>
      </div>
      <button class="primary" id="uploadBtn" disabled onclick="submitUpload()">Upload</button>
    </div>
    <div id="uploadMsg"></div>
  </div>

  <!-- Dashboard content (hidden until award selected) -->
  <div id="dashContent" style="display:none;flex-direction:column;gap:1.25rem"></div>
  <div id="emptyMsg" class="empty" style="display:none">
    <div style="font-size:40px">📊</div>
    <h2 style="color:var(--text)">Select an award</h2>
    <p>Choose an award from the sidebar or upload files above.</p>
  </div>
</main>

<script>
const fmt = new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
const fmtS = v=>{const a=Math.abs(v),s=v<0?'-':'';return a>=1e6?s+'$'+(a/1e6).toFixed(1)+'M':a>=1e3?s+'$'+(a/1e3).toFixed(0)+'k':s+'$'+Math.round(a)};
const pct = (a,b)=>b?Math.min(Math.round(a/b*100),100):0;

let state = {awards:{}, activeAward:null, activeMonth:null, expandedMil:null,
              milFilter:'All', milSearch:'', milSortCol:'overrun', milSortDir:-1};
let spendChart = null;
let pendingFiles = [];

/* ── Load registry on boot ── */
async function boot(){
  const res = await fetch('/api/awards');
  state.awards = await res.json();
  renderSidebar();
  const ids = Object.keys(state.awards);
  if(ids.length){
    const a = state.awards[ids[0]];
    const months = Object.keys(a.months||{});
    if(months.length) selectMonth(ids[0], months[months.length-1]);
    else { document.getElementById('emptyMsg').style.display='flex'; }
  }
}

/* ── Sidebar ── */
function renderSidebar(){
  const el = document.getElementById('awardList');
  el.innerHTML = '';
  if(!Object.keys(state.awards).length){
    el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:.25rem .5rem">None yet</div>';
    return;
  }
  Object.values(state.awards).forEach(a=>{
    const months = Object.keys(a.months||{});
    const wrap = document.createElement('div');

    const btn = document.createElement('button');
    btn.className='award-btn'+(state.activeAward===a.id?' active':'');
    btn.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1" title="${a.id}">${a.id}</span><span class="del" onclick="deleteAward('${a.id}',event)" title="Delete">✕</span>`;
    btn.addEventListener('click', ()=>toggleAward(a.id));
    wrap.appendChild(btn);

    // Month sub-list (show if active award)
    if(state.activeAward===a.id){
      months.forEach(mo=>{
        const mb=document.createElement('button');
        mb.className='month-btn'+(state.activeMonth===mo?' active':'');
        mb.textContent=mo;
        mb.addEventListener('click',e=>{e.stopPropagation();selectMonth(a.id,mo);});
        wrap.appendChild(mb);
      });
    }
    el.appendChild(wrap);
  });
}

function toggleAward(id){
  if(state.activeAward===id){state.activeAward=null;state.activeMonth=null;renderSidebar();showEmpty();}
  else {
    state.activeAward=id;
    const months=Object.keys(state.awards[id].months||{});
    if(months.length) selectMonth(id, months[months.length-1]);
    else {renderSidebar();showEmpty();}
  }
}

function showEmpty(){
  document.getElementById('dashContent').style.display='none';
  document.getElementById('emptyMsg').style.display='flex';
}

async function selectMonth(awardId, month){
  state.activeAward=awardId;
  state.activeMonth=month;
  state.expandedMil=null;
  renderSidebar();
  const res = await fetch(`/api/award/${encodeURIComponent(awardId)}/month/${month}`);
  const data = await res.json();
  renderDashboard(awardId, month, data);
}

async function deleteAward(id, e){
  e.stopPropagation();
  if(!confirm(`Delete award "${id}" and all its months?`)) return;
  await fetch(`/api/award/${encodeURIComponent(id)}`, {method:'DELETE'});
  delete state.awards[id];
  if(state.activeAward===id){state.activeAward=null;state.activeMonth=null;}
  renderSidebar();
  showEmpty();
  const res=await fetch('/api/awards');
  state.awards=await res.json();
  renderSidebar();
}

/* ── Dashboard render ── */
function renderDashboard(awardId, month, data){
  const dash = document.getElementById('dashContent');
  dash.style.display='flex';
  document.getElementById('emptyMsg').style.display='none';

  const {summary, milestones=[], monthly=[], hours={}} = data;
  const {budget_total:budget,ytd_total:ytd,month_total:monthT,bal_total:bal,award_number,reporting_month} = summary;
  const budPct = pct(ytd,budget);
  const yrPct  = Math.round((summary.rep_idx+1)/12*100);
  const atRisk = milestones.filter(m=>m.status==='At Risk').length;
  const watch  = milestones.filter(m=>m.status==='Watch').length;
  const onTrack= milestones.filter(m=>m.status==='On Track'||m.status==='Complete').length;

  /* Alerts */
  let alerts='';
  if(bal<0) alerts+=`<div class="alert alert-danger">Portfolio balance is negative (${fmt.format(bal)}) — projected spend exceeds budget.</div>`;
  else if(budPct>yrPct+5) alerts+=`<div class="alert alert-warn">Spending ahead of pace: ${budPct}% of budget used vs. ${yrPct}% of year elapsed.</div>`;
  else alerts+=`<div class="alert alert-ok">On track — ${budPct}% of budget used, ${yrPct}% of year elapsed.</div>`;
  if(atRisk) alerts+=`<div class="alert alert-danger">${atRisk} milestone${atRisk>1?'s':''} at risk of overrun.</div>`;
  if(watch)  alerts+=`<div class="alert alert-warn">${watch} milestone${watch>1?'s':''} on watch.</div>`;

  /* KPIs */
  const kpiHtml = `<div class="kpi-grid">
    ${kpi('Award budget',fmt.format(budget),'total allocated')}
    ${kpi('YTD spent',fmt.format(ytd),budPct+'% of budget',ytd>budget?'var(--danger)':'')}
    ${kpi('Est. balance',fmt.format(bal),'projected remaining',bal<0?'var(--danger)':'var(--success)')}
    ${kpi('This month',fmt.format(monthT),reporting_month+' actuals')}
    ${kpi('On Track',onTrack,'milestones','var(--success)')}
    ${kpi('At Risk / Watch',atRisk+' / '+watch,'milestones',atRisk?'var(--danger)':watch?'var(--warn)':'')}
  </div>`;

  /* Pace bar */
  const paceColor = budPct>yrPct+10?'var(--danger)':budPct>yrPct+2?'var(--warn)':'var(--success)';
  const paceHtml=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem">
      <h2 style="margin:0">Budget pace</h2>
      <span style="font-size:12px;color:var(--muted)">${budPct}% spent · ${yrPct}% of year elapsed</span>
    </div>
    <div style="position:relative;height:10px;background:#e2e8f0;border-radius:5px;margin:.5rem 0">
      <div style="height:100%;width:${Math.min(budPct,100)}%;background:${paceColor};border-radius:5px"></div>
      <div style="position:absolute;top:-4px;left:${Math.min(yrPct,100)}%;width:2px;height:18px;background:var(--muted);border-radius:1px" title="Year elapsed"></div>
    </div>
    <div style="font-size:11px;color:var(--muted)">Bar = budget consumed. Marker = year elapsed.</div>
  </div>`;

  /* Chart + Status mix */
  const twoCol=`<div class="two-col">
    <div class="card">
      <h2>Monthly spend</h2>
      <div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:var(--muted)">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#2563eb;display:inline-block"></span>Actual</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#9ca3af;display:inline-block"></span>Pro-rata budget</span>
      </div>
      <div class="chart-wrap"><canvas id="spendChart" role="img" aria-label="Monthly spend chart"></canvas></div>
    </div>
    <div class="card">
      <h2>Status mix</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">
        ${statusChip('On Track',onTrack,'#dcfce7','#15803d')}
        ${statusChip('Watch',watch,'#fef9c3','#854d0e')}
        ${statusChip('At Risk',atRisk,'#fee2e2','#b91c1c')}
        ${statusChip('Complete',milestones.filter(m=>m.status==='Complete').length,'#dbeafe','#1d4ed8')}
      </div>
      <h3 style="margin-bottom:.5rem">Top overruns</h3>
      ${milestones.filter(m=>m.projected_overrun>0).sort((a,b)=>b.projected_overrun-a.projected_overrun).slice(0,5).map(m=>`
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
          <span style="color:var(--muted)">${m.milestone_id}</span>
          <span style="color:var(--danger);font-weight:600">${fmtS(m.projected_overrun)}</span>
        </div>`).join('')||'<div style="font-size:12px;color:var(--muted)">None projected</div>'}
    </div>
  </div>`;

  /* Milestone table */
  const milHtml = buildMilTable(milestones);

  /* People & hours */
  const peopleHtml = buildPeopleSection(milestones, hours);

  dash.innerHTML = `
    <div class="topbar">
      <div>
        <h1>${awardId}</h1>
        <div class="sub">${reporting_month} reporting · ${milestones.length} milestones</div>
      </div>
    </div>
    ${alerts}
    ${kpiHtml}
    ${paceHtml}
    ${twoCol}
    ${milHtml}
    ${peopleHtml}
  `;

  bindChart(monthly, budget, summary.rep_idx);
  bindMilTable(milestones);
}

function kpi(lbl,val,hint,color=''){
  return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val" style="color:${color}">${val}</div><div class="hint">${hint}</div></div>`;
}
function statusChip(lbl,n,bg,color){
  return `<div style="background:${bg};border-radius:8px;padding:.6rem .75rem"><div style="font-size:11px;color:${color};font-weight:600">${lbl}</div><div style="font-size:20px;font-weight:700;color:${color}">${n}</div></div>`;
}

/* ── Spend chart ── */
function bindChart(monthly, budget, repIdx){
  if(spendChart){spendChart.destroy();spendChart=null;}
  const canvas=document.getElementById('spendChart');
  if(!canvas) return;
  const labels=monthly.map(m=>m.month);
  const actuals=monthly.map(m=>m.is_forecast?null:m.value);
  const proRata=monthly.map((_,i)=>i<=repIdx?Math.round(budget*(i+1)/12):null);
  spendChart=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Actual',data:actuals,backgroundColor:'#2563eb',borderRadius:4,order:2},
      {label:'Pro-rata budget',data:proRata,type:'line',borderColor:'#9ca3af',backgroundColor:'rgba(156,163,175,0.08)',borderWidth:1.5,borderDash:[4,3],pointRadius:3,fill:false,tension:0.2,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y===null?null:ctx.dataset.label+': '+fmt.format(ctx.parsed.y)}}},
      scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:11}}},y:{ticks:{callback:v=>'$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?Math.round(v/1e3)+'k':v),font:{size:11}},min:0}}
    }
  });
}

/* ── Milestone table ── */
function buildMilTable(milestones){
  return `<div class="card" id="milCard">
    <h2>Milestone snapshot</h2>
    <div class="filter-row">
      <div class="tab-btns" id="milTabs">
        ${['All','On Track','Watch','At Risk','Complete'].map(f=>`<button class="tab-btn${f===state.milFilter?' active':''}" onclick="setMilFilter('${f}',milestones_data)">${f}</button>`).join('')}
      </div>
      <input type="search" placeholder="Search…" id="milSearch" value="${state.milSearch}" style="margin-left:auto;width:160px" oninput="updateMilSearch(this.value)"/>
    </div>
    <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="sortMil('milestone_id')">Milestone</th>
        <th onclick="sortMil('status')">Status</th>
        <th onclick="sortMil('budget')" style="text-align:right">Budget</th>
        <th onclick="sortMil('ytd_actual')" style="text-align:right">YTD actual</th>
        <th onclick="sortMil('percent_spent')" style="text-align:right">% used</th>
        <th onclick="sortMil('projected_overrun')" style="text-align:right">Proj. overrun</th>
        <th onclick="sortMil('est_balance')" style="text-align:right">Est. balance</th>
        <th onclick="sortMil('people_count')" style="text-align:right">Staff</th>
        <th onclick="sortMil('hours_total')" style="text-align:right">Hours</th>
      </tr></thead>
      <tbody id="milBody"></tbody>
    </table></div>
  </div>`;
}

function bindMilTable(milestones){
  window.milestones_data = milestones;
  renderMilBody(milestones);

  // Expose filter/sort for onclick handlers
  window.setMilFilter = (f, mils)=>{
    state.milFilter=f;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===f));
    renderMilBody(mils);
  };
  window.updateMilSearch = v=>{
    state.milSearch=v;
    renderMilBody(milestones);
  };
  window.sortMil = col=>{
    if(state.milSortCol===col) state.milSortDir*=-1;
    else {state.milSortCol=col;state.milSortDir=-1;}
    renderMilBody(milestones);
  };
  window.toggleMil = id=>{
    const row=document.getElementById('exp_'+id);
    if(!row) return;
    if(state.expandedMil&&state.expandedMil!==id){
      const prev=document.getElementById('exp_'+state.expandedMil);
      if(prev) prev.style.display='none';
    }
    const open=row.style.display!=='none';
    row.style.display=open?'none':'table-row';
    state.expandedMil=open?null:id;
  };
}

function getFilteredMils(mils){
  let rows=[...mils];
  if(state.milFilter!=='All') rows=rows.filter(m=>m.status===state.milFilter);
  if(state.milSearch) rows=rows.filter(m=>m.title.toLowerCase().includes(state.milSearch.toLowerCase())||m.milestone_id.toLowerCase().includes(state.milSearch.toLowerCase()));
  rows.sort((a,b)=>{
    const va=a[state.milSortCol]??0, vb=b[state.milSortCol]??0;
    if(typeof va==='string') return state.milSortDir*(va.localeCompare(vb));
    return state.milSortDir*(vb-va);
  });
  return rows;
}

function renderMilBody(mils){
  const tbody=document.getElementById('milBody');
  if(!tbody) return;
  const rows=getFilteredMils(mils);
  tbody.innerHTML=rows.map(m=>{
    const pillCls=m.status==='At Risk'?'p-red':m.status==='Watch'?'p-amber':m.status==='Complete'?'p-blue':'p-green';
    const barW=Math.min(m.percent_spent||0,100);
    const barC=m.status==='At Risk'?'var(--danger)':m.status==='Watch'?'var(--warn)':'var(--success)';
    const oc=m.projected_overrun>0?'color:var(--danger)':'color:var(--success)';
    const bc=m.est_balance<0?'color:var(--danger)':'color:var(--success)';

    const wsHtml=(m.workstreams||[]).map(w=>{
      const wp=w.budget>0?Math.min(Math.round(w.ytd/w.budget*100),100):0;
      const wc=wp>90?'var(--danger)':wp>70?'var(--warn)':'var(--success)';
      return `<div class="ws-card">
        <div class="wn">${w.name}</div>
        <div class="wm">This month: ${fmt.format(w.month_val||0)}</div>
        <div class="wm">YTD: ${fmt.format(w.ytd||0)} / ${fmt.format(w.budget||0)}</div>
        <div class="prog" style="margin-top:4px"><div class="prog-fill" style="width:${wp}%;background:${wc}"></div></div>
        <div style="font-size:11px;color:${wc};margin-top:2px">${wp}% of allocation</div>
      </div>`;
    }).join('');

    const narrative=m.narrative?`<div style="font-size:12px;color:var(--muted);margin-top:.5rem;font-style:italic">${m.narrative}</div>`:'';

    return `<tr onclick="toggleMil('${m.milestone_id}')" id="row_${m.milestone_id}">
      <td><span style="font-weight:600">${m.milestone_id}</span><div style="font-size:11px;color:var(--muted)">${(m.title||'').split('—').slice(1).join('—').trim().slice(0,50)}</div></td>
      <td><span class="pill ${pillCls}">${m.status}</span></td>
      <td style="text-align:right">${fmt.format(m.budget||0)}</td>
      <td style="text-align:right">${fmt.format(m.ytd_actual||0)}</td>
      <td style="text-align:right">
        <span>${Math.round(m.percent_spent||0)}%</span>
        <div class="prog"><div class="prog-fill" style="width:${barW}%;background:${barC}"></div></div>
      </td>
      <td style="text-align:right;${oc}">${m.projected_overrun>0?'+':''}${fmtS(m.projected_overrun||0)}</td>
      <td style="text-align:right;${bc}">${fmtS(m.est_balance||0)}</td>
      <td style="text-align:right">${m.people_count||0}</td>
      <td style="text-align:right">${(m.hours_total||0).toLocaleString()}</td>
    </tr>
    <tr class="expand-row" id="exp_${m.milestone_id}" style="display:none"><td colspan="9">
      <div class="expand-inner">
        <div style="font-weight:600;font-size:13px;margin-bottom:.4rem">${m.milestone_id} — workstreams · ${m.people_count||0} staff · ${(m.hours_total||0).toLocaleString()} hrs YTD</div>
        ${narrative}
        <div class="ws-grid">${wsHtml||'<div style="font-size:12px;color:var(--muted)">No workstream data</div>'}</div>
      </div>
    </td></tr>`;
  }).join('');
}

/* ── People & hours section ── */
function buildPeopleSection(milestones, hours){
  const byLcat=(hours.by_lcat||[]).slice(0,8);
  const byMil=(hours.by_milestone||[]).slice(0,8);
  const maxL=Math.max(...byLcat.map(x=>x.hours),1);
  const maxM=Math.max(...byMil.map(x=>x.hours),1);
  const maxP=Math.max(...milestones.map(m=>m.people_count||0),1);

  const topPeople=[...milestones].sort((a,b)=>(b.people_count||0)-(a.people_count||0)).slice(0,5);
  const topHours=[...milestones].sort((a,b)=>(b.hours_total||0)-(a.hours_total||0)).slice(0,5);

  const haveHours=byLcat.length>0;

  return `<div class="card">
    <h2>People & hours analytics</h2>
    ${haveHours?`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem">
      <div>
        <h3 style="margin-bottom:.6rem">Hours by LCAT (top 8)</h3>
        ${byLcat.map(r=>`<div class="pbar-row">
          <span class="pbar-label" title="${r.lcat}">${r.lcat}</span>
          <div class="pbar-track"><div class="pbar-fill" style="width:${pct(r.hours,maxL)}%;background:#2563eb"></div></div>
          <span class="pbar-val">${r.hours.toLocaleString()}</span>
        </div>`).join('')}
      </div>
      <div>
        <h3 style="margin-bottom:.6rem">Hours by milestone (from hours file)</h3>
        ${byMil.map(r=>`<div class="pbar-row">
          <span class="pbar-label" title="${r.milestone_id}">${r.milestone_id}</span>
          <div class="pbar-track"><div class="pbar-fill" style="width:${pct(r.hours,maxM)}%;background:#059669"></div></div>
          <span class="pbar-val">${r.hours.toLocaleString()}</span>
        </div>`).join('')}
      </div>
    </div>`:'<div style="font-size:13px;color:var(--muted);margin-bottom:1rem">Upload a *Hours*LCAT*.xlsx file with this month\'s data to see LCAT breakdown.</div>'}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem">
      <div>
        <h3 style="margin-bottom:.6rem">Top 5 by staff count</h3>
        ${topPeople.map(m=>`<div class="pbar-row">
          <span class="pbar-label" title="${m.milestone_id}">${m.milestone_id}</span>
          <div class="pbar-track"><div class="pbar-fill" style="width:${pct(m.people_count||0,maxP)}%;background:#7c3aed"></div></div>
          <span class="pbar-val">${m.people_count||0}</span>
        </div>`).join('')}
      </div>
      <div>
        <h3 style="margin-bottom:.6rem">Top 5 by hours YTD</h3>
        ${topHours.map(m=>`<div class="pbar-row">
          <span class="pbar-label" title="${m.milestone_id}">${m.milestone_id}</span>
          <div class="pbar-track"><div class="pbar-fill" style="width:${pct(m.hours_total||0,Math.max(...topHours.map(x=>x.hours_total||0),1))}%;background:#d97706"></div></div>
          <span class="pbar-val">${(m.hours_total||0).toLocaleString()}</span>
        </div>`).join('')}
      </div>
    </div>

    <h3 style="margin-bottom:.6rem">All milestones — people & hours</h3>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Milestone</th><th style="text-align:right">Staff</th>
        <th style="text-align:right">Hours YTD</th><th style="text-align:right">Hrs / person</th>
        <th style="text-align:right">Labor budget</th><th style="text-align:right">Labor YTD</th>
      </tr></thead>
      <tbody>${[...milestones].sort((a,b)=>(b.people_count||0)-(a.people_count||0)).map(m=>{
        const lb=m.workstreams?.find(w=>w.name==='Labor');
        return `<tr>
          <td><span style="font-weight:600">${m.milestone_id}</span></td>
          <td style="text-align:right">${m.people_count||0}</td>
          <td style="text-align:right">${(m.hours_total||0).toLocaleString()}</td>
          <td style="text-align:right">${m.people_count?Math.round((m.hours_total||0)/(m.people_count)):'—'}</td>
          <td style="text-align:right">${lb?fmt.format(lb.budget):'—'}</td>
          <td style="text-align:right">${lb?fmt.format(lb.ytd):'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

/* ── File upload UI ── */
function classifyFile(name){
  const n=name.toLowerCase();
  if(n.endsWith('.docx')) return 'narrative';
  if(/hours.*lcat|lcat.*hours|lcat/.test(n)) return 'hours';
  if(/points.*milestone|milestone.*points|story|stories|points/.test(n)) return 'stories';
  return 'main';
}

function renderFileList(){
  const el=document.getElementById('fileList');
  el.innerHTML=pendingFiles.map((f,i)=>{
    const kind=classifyFile(f.name);
    return `<div class="file-chip">
      <span>${f.name}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="kind kind-${kind}">${kind}</span>
        <button onclick="removeFile(${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('uploadBtn').disabled=pendingFiles.length===0;
}

window.removeFile=function(i){pendingFiles.splice(i,1);renderFileList();};

function addFiles(fileList){
  Array.from(fileList).forEach(f=>{
    if(!pendingFiles.find(p=>p.name===f.name)) pendingFiles.push(f);
  });
  renderFileList();
}

/* Drop zone */
const dropZone=document.getElementById('dropZone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('over');addFiles(e.dataTransfer.files);});
document.getElementById('mainUpload').addEventListener('change',e=>addFiles(e.target.files));
document.getElementById('sideUpload').addEventListener('change',e=>addFiles(e.target.files));

async function submitUpload(){
  if(!pendingFiles.length) return;
  const btn=document.getElementById('uploadBtn');
  btn.disabled=true; btn.textContent='Uploading…';

  const fd=new FormData();
  pendingFiles.forEach(f=>fd.append('files[]',f));
  const ao=document.getElementById('awardOverride').value.trim();
  const mo=document.getElementById('monthOverride').value;
  if(ao) fd.append('award_id',ao);
  if(mo) fd.append('month',mo);

  try{
    const res=await fetch('/api/upload',{method:'POST',body:fd});
    const data=await res.json();
    if(res.ok){
      showMsg(`Uploaded ${data.milestones} milestones for ${data.award_id} / ${data.month}.`,'ok');
      pendingFiles=[];
      renderFileList();
      document.getElementById('awardOverride').value='';
      document.getElementById('monthOverride').value='';
      const reg=await fetch('/api/awards').then(r=>r.json());
      state.awards=reg;
      renderSidebar();
      selectMonth(data.award_id, data.month);
    } else {
      showMsg(data.error||'Upload failed.','err');
    }
  } catch(e){
    showMsg('Network error: '+e.message,'err');
  }
  btn.disabled=false; btn.textContent='Upload';
}

function showMsg(msg,type){
  const el=document.getElementById('uploadMsg');
  el.className='upload-msg '+(type==='ok'?'ok':'err');
  el.textContent=msg;
  if(type==='ok') setTimeout(()=>el.textContent='',5000);
}

boot();
</script>
